<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto File Explorer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-10">

<h1 class="text-3xl font-bold text-center mb-8">
📂 Auto Scan Semua File
</h1>

<div id="fileList" class="grid gap-4 max-w-3xl mx-auto"></div>

<script>

async function loadFiles() {

    const apiURL = "https://api.github.com/repos/minenc02/myslide/contents";

    try {

        const response = await fetch(apiURL);

        if (!response.ok) {
            throw new Error("Gagal ambil data dari GitHub API");
        }

        const files = await response.json();

        const container = document.getElementById("fileList");

        files.forEach(file => {

            if (file.type === "file") {

                // Gunakan encodeURI agar file dengan spasi tetap bisa dibuka
                const safeURL = encodeURI(file.name);

                const link = document.createElement("a");
                link.href = safeURL;
                link.target = "_blank";
                link.className = "block bg-slate-700 hover:bg-blue-600 p-4 rounded-xl transition";

                link.innerHTML = "📄 " + file.name;

                container.appendChild(link);
            }

        });

    } catch (err) {

        document.getElementById("fileList").innerHTML =
            "<p class='text-red-400'>❌ " + err.message + "</p>";

    }

}

loadFiles();

</script>

</body>
</html>
