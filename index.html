<script>
const username = "minenc02";
const repo = "minenc02.github.io";
const branch = "main";
const folder = "myslide";

const apiURL = `https://api.github.com/repos/${username}/${repo}/contents/${folder}?ref=${branch}`;

async function loadFiles() {
    const container = document.getElementById("fileList");

    try {
        const response = await fetch(apiURL, {
            headers: {
                "Accept": "application/vnd.github.v3+json"
            }
        });

        if (!response.ok) {
            throw new Error("HTTP Error: " + response.status);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
            throw new Error("Folder tidak ditemukan.");
        }

        container.innerHTML = "";

        const htmlFiles = data.filter(file =>
            file.type === "file" &&
            file.name.endsWith(".html") &&
            file.name !== "index.html"
        );

        if (htmlFiles.length === 0) {
            container.innerHTML =
                "<p class='text-center text-red-400'>Tidak ada file HTML ditemukan.</p>";
            return;
        }

        htmlFiles.forEach(file => {
            const link = document.createElement("a");

            // gunakan path lengkap supaya aman
            link.href = `/${file.path}`;
            link.className =
                "block bg-slate-700 hover:bg-cyan-600 transition p-4 rounded-xl text-lg font-semibold text-center";

            link.textContent = file.name.replace(".html", "").toUpperCase();

            container.appendChild(link);
        });

    } catch (error) {
        container.innerHTML =
            `<p class='text-center text-red-400'>Error: ${error.message}</p>`;
        console.error(error);
    }
}

loadFiles();
</script>
