<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar File</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-10">

<h1 class="text-3xl font-bold mb-6 text-center">
📂 Daftar File Repository
</h1>

<div id="status" class="text-center text-yellow-400 mb-4">
Memuat data...
</div>

<div id="fileList" class="grid gap-3"></div>

<script>
async function loadFiles() {
    const apiURL = "https://api.github.com/repos/minenc02/myslide/contents/";

    try {
        const response = await fetch(apiURL);

        if (!response.ok) {
            throw new Error("Gagal akses API: " + response.status);
        }

        const data = await response.json();

        document.getElementById("status").innerHTML = "";

        const fileList = document.getElementById("fileList");

        if (data.length === 0) {
            fileList.innerHTML = "<p class='text-gray-400'>Tidak ada file ditemukan.</p>";
            return;
        }

        data.forEach(item => {
            if (item.type === "file") {
                const link = document.createElement("a");
                link.href = item.html_url;
                link.target = "_blank";
                link.className = "block bg-slate-800 hover:bg-slate-700 p-4 rounded-xl transition";

                link.innerHTML = `📄 ${item.name}`;
                fileList.appendChild(link);
            }
        });

    } catch (error) {
        document.getElementById("status").innerHTML =
            "<span class='text-red-400'>❌ Error: " + error.message + "</span>";
    }
}

loadFiles();
</script>

</body>
</html>
