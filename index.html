<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Semua File</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(to bottom right, #0f172a, #1e293b);
}
</style>

</head>
<body class="min-h-screen text-white p-10">

<h1 class="text-3xl font-bold mb-6 text-center">
📂 Semua File di Repository
</h1>

<div id="fileList" class="grid gap-3"></div>

<script>
async function loadFiles() {
    const apiURL = "https://api.github.com/repos/minenc02/myslide/contents/";

    try {
        const response = await fetch(apiURL);
        const data = await response.json();

        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        data.forEach(item => {
            const link = document.createElement("a");
            link.href = item.download_url;
            link.target = "_blank";
            link.className = "block bg-slate-800 hover:bg-slate-700 p-4 rounded-xl transition duration-300";

            link.innerHTML = `
                <div class="flex justify-between items-center">
                    <span>📄 ${item.name}</span>
                    <span class="text-sm text-gray-400">${item.type}</span>
                </div>
            `;

            fileList.appendChild(link);
        });

    } catch (error) {
        document.getElementById("fileList").innerHTML =
            "<p class='text-red-400'>Gagal mengambil data dari GitHub API</p>";
    }
}

loadFiles();
</script>

</body>
</html>
